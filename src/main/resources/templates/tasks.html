<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>To-Do Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 d-flex flex-column align-items-center text-center">

    <h1 class="mb-4">TO DO APPLICATION</h1>

    <form action="/tasks" method="post" class="row g-2 w-100" style="max-width: 600px;">
        <div class="col-md-10">
            <input class="form-control form-control-lg" type="text" name="title" placeholder="Add a new task.." required>
        </div>
        <div class="col-md-2 d-grid">
            <button type="submit" class="btn btn-primary btn-lg">Add</button>
        </div>
    </form>

    <div class="mt-4 w-100" style="max-width: 600px;">
        <th:block th:each="task : ${tasks}">
            <div class="p-3 my-2 bg-white rounded shadow-sm d-flex justify-content-between align-items-center text-start">

                <span th:classappend="${task.completed} ? 'text-decoration-line-through text-muted'" th:text="${task.title}" class="fs-5">Task Title</span>
                <div>
                    <a th:href="@{/tasks/{id}/toggle(id=${task.id})}" class="btn btn-outline-secondary btn-sm">Toggle</a>
                    <a th:href="@{/tasks/{id}/delete(id=${task.id})}" class="btn btn-outline-danger btn-sm ml-2">Delete</a>
                </div>

            </div> </th:block>
    </div>
</div>

</body>
</html>
